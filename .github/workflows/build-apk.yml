name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build web app
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_OAUTH_REDIRECT_URL: ${{ secrets.VITE_OAUTH_REDIRECT_URL }}
        run: npm run build

      - name: Generate Capacitor Android project
        run: npx cap add android

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 secret is not set. Add the signing secrets (see CLAUDE.md → Android signing) so every build shares one key."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/release.keystore
          echo "Wrote android/app/release.keystore ($(stat -c%s android/app/release.keystore) bytes)"

      - name: Apply SMS plugin patches
        run: node android-patches/apply-patches.mjs

      # Regenerate ic_launcher/ic_launcher_round, the adaptive foreground/background,
      # and every mipmap-* density from assets/icon-only|foreground|background.png so
      # the default Capacitor icon is fully replaced. android/ is recreated on every
      # run, so this MUST happen in CI — committing the generated res/ would be moot.
      - name: Generate launcher icons (Android)
        run: npx @capacitor/assets generate --android

      - name: Sync web build into Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Compute version name
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # Signed RELEASE build: one fixed keystore (decoded above) → every APK
      # carries the same signature, so it installs in-place over the previous
      # version. versionCode = CI run number guarantees a monotonic upgrade.
      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          ./gradlew assembleRelease --no-daemon --stacktrace
          -PversionCode=${{ github.run_number }}
          -PversionName=${{ steps.ver.outputs.name }}

      - name: Rename APK
        run: |
          mkdir -p out
          SRC=android/app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$SRC" ]; then
            echo "::error::Expected signed APK not found at $SRC (an unsigned APK means signing failed — check the ANDROID_* secrets)."
            ls -R android/app/build/outputs/apk || true
            exit 1
          fi
          cp "$SRC" out/finsight.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: finsight-apk
          path: out/finsight.apk
          retention-days: 30

      - name: Attach APK to GitHub Release (only for v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/finsight.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
